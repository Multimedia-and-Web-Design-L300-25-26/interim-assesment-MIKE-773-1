services:
  - type: web
    name: coinbase-clone-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false  # You'll set this manually
      - key: CLIENT_URL
        sync: false  # You'll set this to your Netlify URL